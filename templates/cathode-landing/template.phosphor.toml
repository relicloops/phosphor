[manifest]
schema = 1
id = "cathode-landing"
version = "0.1.0"

[template]
name = "Cathode Landing Page"
source_root = "."
description = "Minimal Cathode JSX landing page for the NeonSignal ecosystem"
min_phosphor = "0.0.0-017"
license = "Apache-2.0"

[[variables]]
name = "name"
type = "string"
required = true

[[variables]]
name = "project_description"
type = "string"
default = "A Cathode JSX website"

[[variables]]
name = "github_url"
type = "url"
default = "https://github.com"

[filters]
exclude = [
  "node_modules",
  "build",
  "public",
  ".DS_Store",
]
binary_ext = [".svg", ".png", ".jpg", ".gif", ".ico", ".woff2"]

[build]
entry = "src/app.tsx"

[[build.defines]]
name = "__PROJECT_DEV__"
env = "PROJECT_DEV"
default = "false"

[[build.defines]]
name = "__PROJECT_PUBLIC_DIR__"
env = "PROJECT_PUBLIC_DIR"
default = ""

[deploy]
public_dir = "public/<<name>>.host"

[serve]
no_redirect = false

[serve.neonsignal]
port = 9443
www_root = "public"
certs_root = "certs"

[serve.redirect]
port = 9090

[certs]
output_dir = "certs"

[[certs.domains]]
name = "<<name>>.host"
mode = "local"
san = ["<<name>>.host", "localhost", "127.0.0.1"]

[[ops]]
id = "render-source"
kind = "render"
from = "."
to = "."

[[hooks]]
when = "post-create"
run = ["npm", "install"]
cwd = "."
allow_failure = true

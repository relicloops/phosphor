<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#39ff14" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- outer glass tube -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#7b2ff7" stroke-width="3" opacity="0.7"/>
  <!-- phosphor coating ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#39ff14" stroke-width="4" opacity="0.9"/>
  <!-- inner glow -->
  <circle cx="32" cy="32" r="18" fill="url(#glow)"/>
  <!-- center electrode -->
  <circle cx="32" cy="32" r="4" fill="#39ff14" opacity="0.8"/>
</svg>
